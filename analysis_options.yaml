include: package:flutter_lints/flutter.yaml

linter:
  rules:
    # Within-package imports use relative paths — already the convention,
    # this keeps it from drifting on new files.
    prefer_relative_imports: true
    prefer_single_quotes: true
    avoid_escaping_inner_quotes: true
    eol_at_end_of_file: true
    parameter_assignments: true
    avoid_bool_literals_in_conditional_expressions: true
    omit_local_variable_types: true
    directives_ordering: true
    use_setters_to_change_properties: true
    # NB: `unawaited_futures` is worth turning on once the existing ~26
    # fire-and-forget sites (mostly Hive writes) are wrapped in
    # `unawaited(...)`. Tracked separately.
