name: Release Android (Google Play)

# Releases are driven by pubspec.yaml, exactly like release-ios.yml: bump
# `version:` (name + build number, e.g. 1.11.2+24) and push to main — when the
# version line changes this builds a signed AAB and uploads it to the Google
# Play internal track (promote to production from the Play Console, or change
# `track:` below to release straight to production).
# The v<version> git tag is stamped by release-ios.yml, so this workflow
# deliberately does not tag.

on:
  push:
    branches: [main]
    paths: ['pubspec.yaml']

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.detect.outputs.release }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the previous commit to diff the version line

      - name: Detect version bump
        id: detect
        run: |
          NEW="$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')"
          OLD="$(git show '${{ github.event.before }}:pubspec.yaml' 2>/dev/null | grep '^version:' | sed 's/version:[[:space:]]*//' || true)"
          echo "old=$OLD  new=$NEW"
          if [ "$NEW" = "$OLD" ]; then
            echo "Version unchanged — not a release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version bumped $OLD -> $NEW — releasing."
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "version=${NEW%%+*}" >> "$GITHUB_OUTPUT"
          fi

  play:
    needs: check
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # uv runs the release-notes extraction below (inline pyyaml dep).
      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Materialize the upload keystore + key.properties. build.gradle.kts
      # picks up android/key.properties automatically and switches the release
      # build to real signing (it falls back to debug signing without it).
      - name: Install signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/upload-keystore.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=upload
          storeFile=$KEYSTORE_PATH
          EOF

      - run: flutter pub get

      # Build name + number come straight from pubspec.yaml (the source of truth).
      # Play requires the +build number (versionCode) to increase every release.
      - name: Build signed AAB
        run: flutter build appbundle --release

      # Extract this version's "What's New" from store/release_notes.yaml into
      # the whatsnew-<locale> files Play expects. Locales must already exist on
      # the Play listing; Play caps release notes at 500 chars per locale.
      # A version with no entry ships without release notes (the dir stays empty).
      - name: Generate Play release notes
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          uv run --with pyyaml python - <<'EOF'
          import os, pathlib, sys, yaml

          # Short code (our YAML keys) → every Google Play locale of that
          # language on the listing. Play falls back to the default language
          # (en-US) for locales without notes, so regional variants must be
          # listed here or their users get English.
          LOCALE_MAP = {
              "en": ["en-US"],
              "de": ["de-DE"],
              "es": ["es-ES", "es-419", "es-US"],
              "fr": ["fr-FR", "fr-CA"],
              "it": ["it-IT"],
              "pt": ["pt-BR", "pt-PT"],
              "nl": ["nl-NL"],
          }

          version = os.environ["VERSION"]
          notes = yaml.safe_load(pathlib.Path("store/release_notes.yaml").read_text())
          out = pathlib.Path("build/whatsnew")
          out.mkdir(parents=True, exist_ok=True)

          entry = notes.get(version)
          if not entry:
              print(f"No release notes for {version} — uploading without What's New.")
              sys.exit(0)

          for short, text in entry.items():
              locales = LOCALE_MAP.get(short)
              if not locales:
                  print(f"::warning::Unmapped language '{short}' — skipped.")
                  continue
              if len(text) > 500:
                  print(f"::error::Release note for '{short}' is {len(text)} chars (Play max 500).")
                  sys.exit(1)
              for locale in locales:
                  (out / f"whatsnew-{locale}").write_text(text)
                  print(f"whatsnew-{locale}: {len(text)} chars")
          EOF

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.lexaway.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          releaseName: ${{ needs.check.outputs.version }}
          whatsNewDirectory: build/whatsnew
          mappingFile: build/app/outputs/mapping/release/mapping.txt
