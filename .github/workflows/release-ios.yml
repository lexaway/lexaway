name: Release iOS (TestFlight)

# Releases are driven by pubspec.yaml. Bump `version:` (name + build number,
# e.g. 1.11.0+18) and push to main — when the version line changes this builds,
# ships to TestFlight, and stamps a v<version> git tag as a record.
# Pushes that touch pubspec.yaml WITHOUT changing the version (e.g. dep bumps)
# are ignored.

on:
  push:
    branches: [main]
    paths: ['pubspec.yaml']

permissions:
  contents: write # to push the release tag

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.detect.outputs.release }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the previous commit to diff the version line

      - name: Detect version bump
        id: detect
        run: |
          NEW="$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')"
          OLD="$(git show '${{ github.event.before }}:pubspec.yaml' 2>/dev/null | grep '^version:' | sed 's/version:[[:space:]]*//' || true)"
          echo "old=$OLD  new=$NEW"
          if [ "$NEW" = "$OLD" ]; then
            echo "Version unchanged — not a release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version bumped $OLD -> $NEW — releasing."
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "version=${NEW%%+*}" >> "$GITHUB_OUTPUT"
          fi

  testflight:
    needs: check
    if: needs.check.outputs.release == 'true'
    # GitHub-hosted Apple Silicon macOS runner — free + unlimited for public
    # repos, and ships with Xcode + CocoaPods preinstalled. (Public repos can't
    # use self-hosted runners without opting in, so hosted is the simpler path.)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # uv runs the publish step (store/publish_store.py with inline deps).
      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Import signing certificate
        env:
          DIST_CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$DIST_CERT_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Prepend our keychain to the search list but KEEP the login keychain,
          # which holds Apple's WWDR intermediate cert needed to validate the chain.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

          # Fail fast with a clear message if the distribution identity isn't present.
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "Distribution"; then
            echo "::error::No distribution signing identity found — check IOS_DIST_CERT_P12 (must be the Apple Distribution cert exported with its private key)."
            exit 1
          fi

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROVISIONING_PROFILE" | base64 --decode > "$PROFILES_DIR/lexaway.mobileprovision"

      - name: Install App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          KEYS_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYS_DIR"
          echo "$ASC_API_KEY_P8" | base64 --decode > "$KEYS_DIR/AuthKey_${ASC_KEY_ID}.p8"

      - run: flutter pub get

      # Build name + number come straight from pubspec.yaml (the source of truth).
      - name: Build signed IPA
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload to App Store Connect (TestFlight)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app --type ios \
            -f build/ios/ipa/*.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      # Push the App Store listing (description, keywords, "What's New", screenshots)
      # from store/*.yaml + screenshots/final/. This is a no-op that exits cleanly
      # when no editable App Store version is prepped — the common case while we're
      # only shipping to TestFlight. It updates the listing the moment a "Prepare
      # for Submission" version exists in App Store Connect. The .p8 key written by
      # the "Install App Store Connect API key" step above is found automatically.
      - name: Publish App Store listing
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          uv run --with "pyjwt[crypto]" --with requests --with pyyaml \
            store/publish_store.py --skip-if-no-version

      # Stamp a tag as a record of what shipped. GITHUB_TOKEN intentionally does
      # not trigger other workflows, so this can't loop back into a release.
      - name: Tag the release
        run: |
          VERSION="v${{ needs.check.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q .; then
            echo "Tag $VERSION already exists — skipping."
          else
            git tag "$VERSION"
            git push origin "$VERSION"
          fi
