name: Release iOS (TestFlight)

# Push a version tag to ship a build to TestFlight, e.g.:
#   git tag v1.10.0 && git push origin v1.10.0
# The tag's version becomes the build name; the run number becomes the build number.

on:
  push:
    tags: ['v*']

jobs:
  testflight:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Derive version from tag
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          DIST_CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$DIST_CERT_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROVISIONING_PROFILE" | base64 --decode > "$PROFILES_DIR/lexaway.mobileprovision"

      - name: Install App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          KEYS_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEYS_DIR"
          echo "$ASC_API_KEY_P8" | base64 --decode > "$KEYS_DIR/AuthKey_${ASC_KEY_ID}.p8"

      - run: flutter pub get

      - name: Build signed IPA
        run: |
          flutter build ipa --release \
            --build-name="${{ steps.version.outputs.name }}" \
            --build-number="${{ github.run_number }}" \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload to App Store Connect (TestFlight)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app --type ios \
            -f build/ios/ipa/*.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
